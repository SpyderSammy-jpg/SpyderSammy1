<head>
  <!-- ... [Keep your other meta and link tags here] ... -->
  
  <style>
    /* 1. Make the background pitch black */
    body, html, #particles-js {
      background: #000 !important;
      background-color: #000 !important;
      background-image: none !important;
    }

    /* 2. Red/Yellow Font Styling for SpyderSammy */
    .title {
      color: #ff0000 !important;
      -webkit-text-stroke: 1.5px #ffff00;
      font-weight: 900;
      background: none !important;
      -webkit-background-clip: initial !important;
      -webkit-text-fill-color: initial !important;
    }

    /* 3. REMOVE ONLY THE LOGO (KEEP THE NAV TABS) */
    /* This targets the logo's background image specifically */
    .f-nav {
      background-image: none !important; 
    }
    /* This removes the "IN" icon if it's a separate link/image in the corner */
    .f-nav a:first-child img, 
    .f-nav .logo, 
    .f-nav::before {
      display: none !important;
      content: none !important;
      background-image: none !important;
    }
  </style>
</head>

<body class="center" onload="SplashT">
  <!-- The navbar remains, but the logo inside it is now hidden -->
  <div class="f-nav"></div> 
  
  <div id="particles-js">
    <script rel="preload" src="https://cdn.jsdelivr.net"></script>
    <div class="main">
      <h1 class="title">SpyderSammy</h1>
      <p id="splash"></p>
      <div class="search-container">
        <form id="fv" method="POST">
          <input id="input" class="truncate" placeholder="Search or enter a URL" type="text" />
        </form>
      </div>
    </div>
  </div>
  <!-- ... [Keep your scripts below] ... -->
</body>
