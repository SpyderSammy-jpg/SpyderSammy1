<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" id="tab-favicon" href="https://gstatic.com" />
  <title id="t">Home - Classroom</title>

  <!-- External Styles -->
  <link rel="stylesheet" href="/assets/css/global.css?v=6" />
  <link rel="stylesheet" href="/assets/css/h.css?v=01" />
  <link rel="stylesheet" href="/assets/css/nav.css?v=01" />

  <!-- Google Fonts for Real Themes -->
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    html, body, #particles-js, .main, .center {
      background: #000 !important;
      background-color: #000 !important;
    }

    /* Core Title Style */
    .title {
      color: #ff0000 !important;
      -webkit-text-stroke: 1.5px #ffff00;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      font-size: 4rem;
      transition: 0.5s all;
    }

    /* THEMED FONT CLASSES */
    .f-default { font-family: sans-serif; }
    .f-easter { font-family: 'Fredoka One', cursive; color: #ff99cc !important; -webkit-text-stroke: 1.5px #fff; }
    .f-halloween { font-family: 'Creepster', system-ui; color: #ff4500 !important; -webkit-text-stroke: 1px #000; letter-spacing: 5px; }
    .f-birthday { font-family: 'Bungee Shade', cursive; color: #00ffff !important; -webkit-text-stroke: 1.5px #ff00ff; }
    .f-christmas { font-family: 'Mountains of Christmas', cursive; color: #2e8b57 !important; -webkit-text-stroke: 1.5px #ff0000; font-weight: bold; }

    /* Admin Popups */
    #admin-auth-popup, #edit-popup {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #000; border: 2.5px solid #ff0000; padding: 25px; z-index: 10005;
      color: #ff0000; font-family: sans-serif; text-align: center; border-radius: 10px;
      box-shadow: 0 0 30px rgba(255,0,0,0.6);
    }
    #admin-auth-popup input, #edit-popup input, #edit-popup select {
      display: block; margin: 12px auto; padding: 10px; background: #111; border: 1.5px solid #ff0000; color: #fff; width: 240px;
    }

    /* The "A" Box */
    #admin-a-btn {
      display: none; position: fixed; top: 155px; right: 20px; z-index: 10000;
      cursor: pointer; border: 2px solid #ff0000; border-radius: 8px; 
      width: 44px; height: 44px; line-height: 44px;
      background: rgba(15, 15, 15, 0.95); text-align: center;
      color: #ff0000; font-family: sans-serif; font-weight: 900; font-size: 26px;
      transition: right 0.3s ease; box-shadow: 0 0 10px rgba(255,0,0,0.3);
    }

    #admin-menu {
      display: none; position: fixed; top: 215px; right: 20px; background: #000;
      border: 2px solid #ff0000; z-index: 10000; width: 150px; border-radius: 5px;
    }
    .admin-opt { padding: 14px; color: white; cursor: pointer; border-bottom: 1px solid #333; text-align: center; font-family: sans-serif; font-size: 14px; }
    .admin-opt:hover { background: #ff0000; color: black; font-weight: bold; }
  </style>
</head>

<body class="center">
  <div class="f-nav"></div>

  <div id="particles-js">
    <div class="main">
      <h1 class="title" id="main-title">SpyderSammy</h1>
      <p id="splash" style="color:#666; font-family:monospace;"></p>
      <div class="search-container">
        <form id="fv" method="POST">
          <input id="input" class="truncate" placeholder="Searching doesn't work..." type="text" />
        </form>
      </div>
    </div>
  </div>

  <div id="admin-auth-popup">
    <h2 style="margin-top:0;">Admin Login</h2>
    <input type="text" id="adm-user" placeholder="Username">
    <input type="password" id="adm-pass" placeholder="Password">
    <button onclick="checkAdmin()" style="background:#ff0000; border:none; padding:12px; cursor:pointer; font-weight:bold; width:100%; border-radius:5px;">ENTER</button>
  </div>

  <div id="admin-a-btn" onclick="toggleAdminMenu()">A</div>

  <div id="admin-menu">
    <div class="admin-opt" onclick="toggleConsole()">Console</div>
    <div class="admin-opt" onclick="toggleEdit()">Edit</div>
    <div class="admin-opt" onclick="logoutAdmin()" style="color:red; font-weight:bold;">LOGOUT</div>
  </div>

  <div id="edit-popup">
    <h3 style="margin-top:0;">Site Customization</h3>
    <input type="text" id="name-input" placeholder="Site Title (Name Selector)">
    <select id="font-select">
      <option value="f-default">Default (Standard)</option>
      <option value="f-easter">Easter (Bubbley/Pink)</option>
      <option value="f-halloween">Halloween (Spooky/Creepy)</option>
      <option value="f-birthday">Birthday (Arcade/Festive)</option>
      <option value="f-christmas">Christmas (Script/Holiday)</option>
    </select>
    <input type="text" id="yt-url" placeholder="YouTube URL (Auto-Format)">
    <input type="text" id="splash-input" placeholder="Custom Splash Text">
    <button onclick="saveAdminEdits()" style="background:#ff0000; color:black; border:none; padding:12px; cursor:pointer; width:100%; font-weight:bold; border-radius:5px; margin-top:10px;">SAVE & APPLY</button>
    <button onclick="toggleEdit()" style="background:#333; color:white; border:none; padding:10px; margin-top:8px; cursor:pointer; width:100%; border-radius:5px;">CANCEL</button>
  </div>

  <div id="admin-console" style="display:none; position:fixed; bottom:20px; left:20px; background:#000; border:2px solid red; padding:12px; z-index:10001; border-radius:5px;">
    <input type="text" id="console-input" placeholder="root@admin:~# command" onkeydown="handleCmd(event)" style="background:#000; color:#0f0; border:none; outline:none; width:300px; font-family:monospace;">
  </div>

  <script>
    let clickCount = 0;
    const titleEl = document.getElementById('main-title');

    // 1. Triple Click Logic
    titleEl.addEventListener('click', () => {
      clickCount++;
      if (clickCount === 3) { document.getElementById('admin-auth-popup').style.display = 'block'; clickCount = 0; }
      setTimeout(() => { clickCount = 0; }, 800);
    });

    function checkAdmin() {
      if (document.getElementById('adm-user').value === "Sharvesh" && document.getElementById('adm-pass').value === "00010698") {
        localStorage.setItem('isAdmin', 'true');
        location.reload();
      }
    }

    function logoutAdmin() {
      localStorage.removeItem('isAdmin');
      location.reload();
    }

    // 2. Menu Logic
    function toggleAdminMenu() {
      const m = document.getElementById('admin-menu');
      m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function toggleEdit() {
      const e = document.getElementById('edit-popup');
      e.style.display = (e.style.display === 'block') ? 'none' : 'block';
      document.getElementById('admin-menu').style.display = 'none';
    }

    function toggleConsole() {
      const c = document.getElementById('admin-console');
      c.style.display = (c.style.display === 'block') ? 'none' : 'block';
      document.getElementById('admin-menu').style.display = 'none';
      document.getElementById('console-input').focus();
    }

    // 3. Command Handling
    function handleCmd(e) {
      if (e.key === 'Enter') {
        const cmd = e.target.value.toLowerCase().trim();
        if (cmd === '/refresh') location.reload();
        if (cmd === '/home') window.location.href = '/';
        if (cmd === '/close') window.close();
        e.target.value = '';
      }
    }

    // 4. Save and Persistence
    function saveAdminEdits() {
      const newName = document.getElementById('name-input').value.trim();
      const newFont = document.getElementById('font-select').value;
      const newSplash = document.getElementById('splash-input').value.trim();
      let newMusic = document.getElementById('yt-url').value.trim();

      if (newName) localStorage.setItem('cName', newName);
      localStorage.setItem('cFont', newFont);
      if (newSplash) localStorage.setItem('cSplash', newSplash);
      if (newMusic.includes('youtube.com')) {
        newMusic = newMusic.replace('youtube.com', 'yout-ube.com');
        localStorage.setItem('cMusic', newMusic);
      }
      
      applyAdminSettings();
      toggleEdit();
    }

    function applyAdminSettings() {
      const sName = localStorage.getItem('cName');
      const sFont = localStorage.getItem('cFont');
      const sSplash = localStorage.getItem('cSplash');
      const sMusic = localStorage.getItem('cMusic');

      if (sName) titleEl.innerText = sName;
      if (sFont) titleEl.className = "title " + sFont;
      if (sSplash) document.getElementById('splash').innerText = sSplash;
      
      if (localStorage.getItem('isAdmin') === 'true') {
        document.getElementById('admin-a-btn').style.display = 'block';
      }
      
      if (sMusic && !window.musicActive) {
        const audio = new Audio(sMusic);
        document.body.addEventListener('click', () => { audio.play(); window.musicActive = true; }, {once: true});
      }
    }

    window.onload = applyAdminSettings;

    // 5. Alignment with Sidebar
    setInterval(() => {
      const side = document.querySelector('.sidebar');
      const isVisible = (side && side.style.display !== 'none' && side.offsetWidth > 0);
      const offset = isVisible ? '330px' : '20px';
      document.getElementById('admin-a-btn').style.right = offset;
      document.getElementById('admin-menu').style.right = offset;
    }, 400);
  </script>
</body>
</html>
