<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    #admin-auth-popup, #edit-popup, #admin-console {
      background: #000;
      border: 2px solid #ff0000;
      padding: 25px;
      z-index: 10005;
      color: #ff0000;
      font-family: sans-serif;
      text-align: center;
      border-radius: 8px;
    }

    #admin-auth-popup input, #edit-popup input, #edit-popup select {
      display: block;
      margin: 10px auto;
      padding: 8px;
      background: #111;
      border: 1px solid #ff0000;
      color: #fff;
      width: 220px;
    }

    #crown-btn {
      display: none;
      position: fixed;
      top: 110px;
      left: 20px;
      z-index: 10000;
      cursor: pointer;
      border: 2px solid #ff0000;
      border-radius: 8px;
      padding: 10px 15px;
      background: rgba(0,0,0,0.8);
      color: #ff0000;
      font-family: sans-serif;
      font-weight: bold;
    }

    #admin-menu {
      display: none;
      position: fixed;
      top: 165px;
      left: 20px;
      background: #000;
      border: 1px solid #ff0000;
      z-index: 10000;
      width: 140px;
      border-radius: 5px;
    }

    .admin-opt {
      padding: 12px;
      color: white;
      cursor: pointer;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    .admin-opt:hover {
      background: #ff0000;
      color: black;
    }
  </style>
</head>

<body class="center">

  <div class="f-nav"></div>

  <div id="particles-js">
    <div class="main">
      <h1 class="title" id="main-title">SpyderSammy</h1>
      <p id="splash"></p>

      <div class="search-container">
        <form id="fv" method="POST">
          <input id="input" class="truncate" placeholder="Searching doesn't work..." type="text" />
        </form>
      </div>
    </div>
  </div>

  <script src="assets/js/index-3.js"></script>
  <script src="/assets/js/h1.js"></script>

  <script>
    function toggleAdminMenu() {
      const m = document.getElementById('admin-menu');
      m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function toggleEdit() {
      const e = document.getElementById('edit-popup');
      e.style.display = (e.style.display === 'block') ? 'none' : 'block';
    }

    function toggleConsole() {
      const c = document.getElementById('admin-console');
      c.style.display = (c.style.display === 'block') ? 'none' : 'block';
    }

    window.onload = () => {
      document.getElementById('crown-btn').style.display =
        localStorage.getItem('isAdmin') ? 'block' : 'none';
    };
  </script>

  <!-- AI Chatbot powered by Elfsight -->
  <script src="https://elfsightcdn.com/platform.js" async></script>
  <div class="elfsight-app-58e557d5-231c-43da-b17c-7f1d9afa1010" data-elfsight-app-lazy></div>

</body>
</html>
