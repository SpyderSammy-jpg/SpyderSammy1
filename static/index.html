<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" id="tab-favicon" href="https://gstatic.com" />
  <title id="t">Home - Classroom</title>

  <link rel="stylesheet" href="/assets/css/global.css?v=6" />
  <link rel="stylesheet" href="/assets/css/h.css?v=01" />
  <link rel="stylesheet" href="/assets/css/nav.css?v=01" />
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    html, body, #particles-js, .main, .center {
      background: #000 !important;
    }

    .title {
      color: #ff0000 !important;
      -webkit-text-stroke: 1.5px #ffff00;
      font-weight: 900;
      cursor: pointer;
    }

    #admin-auth-popup, #edit-popup, .popup {
      display:none; position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:#000; border:2px solid red;
      padding:20px; z-index:10005; color:white;
    }

    #crown-btn {
      display:none; position:fixed; top:110px; left:20px;
      border:2px solid red; padding:10px;
      cursor:pointer; color:red;
    }

    #admin-menu {
      display:none; position:fixed; top:165px; left:20px;
      background:#000; border:1px solid red; width:160px;
    }

    .admin-opt {
      padding:10px; cursor:pointer;
      border-bottom:1px solid #333;
    }
    .admin-opt:hover { background:red; color:black; }

    .close-btn {
      position:absolute; right:10px; top:5px;
      cursor:pointer; color:red;
    }

    #editor {
      width:100%; height:200px;
      background:black; color:#0f0;
    }

    #preview {
      width:100%; height:200px; border:none;
      background:white;
    }

    #scan-bar {
      width:100%; height:10px; background:#111;
      overflow:hidden;
    }
    #scan-fill {
      width:30%; height:100%; background:red;
      animation: scan 1s infinite alternate;
    }
    @keyframes scan {
      from { transform:translateX(0); }
      to { transform:translateX(200%); }
    }
  </style>
</head>

<body class="center">
  <div class="f-nav"></div>

  <div id="particles-js">
    <div class="main">
      <h1 class="title" id="main-title">SpyderSammy</h1>
      <p id="splash"></p>
      <div class="search-container">
        <form id="fv">
          <input id="input" placeholder="Searching doesn't work..." />
        </form>
      </div>
    </div>
  </div>

  <div id="admin-auth-popup">
    <h2>Admin Login</h2>
    <input id="adm-user" placeholder="Username">
    <input id="adm-pass" placeholder="Password">
    <button onclick="checkAdmin()">Login</button>
  </div>

  <div id="crown-btn" onclick="toggleAdminMenu()">Admin</div>

  <div id="admin-menu">
    <div class="admin-opt" id="console-btn" onclick="toggleConsole()">Console</div>
    <div class="admin-opt" onclick="toggleEdit()">Edit</div>

    <div class="admin-opt" onclick="openTest()">Test</div>
    <div class="admin-opt" onclick="openList()">List</div>
    <div class="admin-opt" onclick="openGitHub()">GitHub</div>
    <div class="admin-opt" onclick="openOnline()">Online</div>
    <div class="admin-opt" onclick="openScan()">Scan</div>
    <div class="admin-opt" onclick="openBookmark()">BookMarklets</div>

    <div class="admin-opt" onclick="logoutAdmin()" style="color:red;">Logout</div>
  </div>

  <!-- TEST -->
  <div class="popup" id="test-popup">
    <div class="close-btn" onclick="closePopup('test-popup')">X</div>
    <h2>Testing Zone</h2>
    <p>Your changes will not be saved.</p>

    <select>
      <option>Classic</option>
      <option>Medium</option>
      <option>Advanced</option>
    </select>

    <textarea id="editor"></textarea>
    <button onclick="runPreview()">Commit Changes</button>
    <iframe id="preview"></iframe>
  </div>

  <!-- ONLINE -->
  <div class="popup" id="online-popup">
    <div class="close-btn" onclick="closePopup('online-popup')">X</div>
    <h2 id="online-count"></h2>
  </div>

  <!-- SCAN -->
  <div class="popup" id="scan-popup">
    <div class="close-btn" onclick="closePopup('scan-popup')">X</div>
    <h2 id="scan-text">Scanning...</h2>
    <div id="scan-bar"><div id="scan-fill"></div></div>
  </div>

  <!-- BOOKMARK -->
  <div class="popup" id="bookmark-popup">
    <div class="close-btn" onclick="closePopup('bookmark-popup')">X</div>
    <h2>This part is being updated!</h2>
  </div>

<script>
let clickCount = 0;
const titleEl = document.getElementById('main-title');

titleEl.onclick = () => {
  clickCount++;
  if(clickCount===3){
    document.getElementById('admin-auth-popup').style.display='block';
    clickCount=0;
  }
  setTimeout(()=>clickCount=0,800);
};

function checkAdmin(){
  const u=adm-user.value,p=adm-pass.value;
  if(u==="Sharvesh"&&p==="00010698"){localStorage.setItem('isAdmin','full');location.reload();}
  else if(u==="Rayhaan"&&p==="222"){localStorage.setItem('isAdmin','limited');location.reload();}
}

function toggleAdminMenu(){
  let m=admin-menu;
  m.style.display=m.style.display==='block'?'none':'block';
  if(localStorage.getItem('isAdmin')==='limited') console-btn.style.display='none';
}

function logoutAdmin(){localStorage.removeItem('isAdmin');location.reload();}

function toggleEdit(){edit-popup.style.display=edit-popup.style.display==='block'?'none':'block';}
function toggleConsole(){if(localStorage.getItem('isAdmin')==='limited')return;admin-console.style.display=admin-console.style.display==='block'?'none':'block';}

/* NEW FEATURES */
function openTest(){
  test-popup.style.display='block';
  editor.value=document.documentElement.outerHTML;
}
function runPreview(){preview.srcdoc=editor.value;}

function openList(){window.open("https://docs.google.com/document/d/1stBkKWEtbASCIur9aRl1UJ6qpsU0ykGJzJnK_EGifEY/edit?tab=t.0#heading=h.nj23sjpj5u97");}
function openGitHub(){window.open("https://github.com/SpyderSammy-jpg/SpyderSammy1");}

function openOnline(){
  online-count.innerText="People Online: "+(Math.floor(Math.random()*21)+3);
  online-popup.style.display='block';
}

function openScan(){
  scan-popup.style.display='block';
  setTimeout(()=>{
    scan-text.innerText="Scan complete! This proxy website is safe!";
  },20000);
}

function openBookmark(){bookmark-popup.style.display='block';}

function closePopup(id){document.getElementById(id).style.display='none';}

window.onload=()=>{if(localStorage.getItem('isAdmin'))crown-btn.style.display='block';};
</script>
</body>
</html>
