<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" id="tab-favicon" href="https://gstatic.com" />
  <title id="t">Home - Classroom</title>

  <!-- External Styles -->
  <link rel="stylesheet" href="/assets/css/global.css?v=6" />
  <link rel="stylesheet" href="/assets/css/h.css?v=01" />
  <link rel="stylesheet" href="/assets/css/nav.css?v=01" />

  <style>
    /* 1. Background - Removed !important so Admin Edit works */
    html, body, #particles-js, .main, .center {
      background-color: #000;
      background-image: none;
      transition: background-color 0.4s ease;
    }

    /* 2. Title Styling */
    .title {
      color: #ff0000 !important;
      -webkit-text-stroke: 1.5px #ffff00;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
    }

    /* 3. Admin Elements Style */
    #admin-auth-popup, #edit-popup {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #000; border: 2px solid #ff0000; padding: 25px; z-index: 10005;
      color: #ff0000; font-family: sans-serif; text-align: center; border-radius: 8px;
    }
    #admin-auth-popup input, #edit-popup input {
      display: block; margin: 10px auto; padding: 8px; background: #111; border: 1px solid #ff0000; color: #fff;
    }

    /* Crown Icon - Styled to match your Tools Icon */
    #crown-btn {
      display: none; position: fixed; top: 110px; right: 20px; z-index: 10000;
      cursor: pointer; border: 1px solid #ff0000; border-radius: 8px; padding: 8px;
      background: rgba(0,0,0,0.8); transition: right 0.3s ease;
    }
    #crown-btn img { width: 30px; height: 30px; filter: drop-shadow(0 0 5px red); }

    /* Admin Dropdown Menu */
    #admin-menu {
      display: none; position: fixed; top: 165px; right: 20px; background: #000;
      border: 1px solid #ff0000; z-index: 10000; width: 140px; border-radius: 5px;
    }
    .admin-opt { padding: 12px; color: white; cursor: pointer; border-bottom: 1px solid #333; text-align: center; font-family: sans-serif; }
    .admin-opt:hover { background: #ff0000; color: black; }

    /* Console */
    #admin-console {
      display: none; position: fixed; bottom: 20px; left: 20px; background: #000;
      border: 2px solid #ff0000; padding: 10px; z-index: 10001;
    }
    #admin-console input { background: #000; color: #0f0; border: none; outline: none; width: 250px; font-family: monospace; }
  </style>

  <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
</head>

<body class="center">
  <div class="f-nav"></div>

  <div id="particles-js">
    <div class="main">
      <h1 class="title">SpyderSammy</h1>
      <p id="splash"></p>
      <div class="search-container">
        <form id="fv" method="POST">
          <input id="input" class="truncate" placeholder="Searching doesn't work, click on the Tabs tab and type your url there!" type="text" />
        </form>
      </div>
    </div>
  </div>

  <!-- Admin UI Elements -->
  <div id="admin-auth-popup">
    <h2>Admin Login</h2>
    <input type="text" id="adm-user" placeholder="Username">
    <input type="password" id="adm-pass" placeholder="Password">
    <button onclick="checkAdmin()" style="background:#ff0000; border:none; padding:10px 20px; cursor:pointer;">Login</button>
  </div>

  <div id="crown-btn" onclick="toggleAdminMenu()">
    <img src="https://icons8.com" alt="Crown">
  </div>

  <div id="admin-menu">
    <div class="admin-opt" onclick="toggleConsole()">Console</div>
    <div class="admin-opt" onclick="toggleEdit()">Edit</div>
  </div>

  <div id="admin-console">
    <span onclick="this.parentElement.style.display='none'" style="color:red; float:right; cursor:pointer;">X</span>
    <input type="text" id="console-input" placeholder="Type command..." onkeydown="handleCmd(event)">
  </div>

  <div id="edit-popup">
    <h3>Global Settings</h3>
    <p>Background Color</p>
    <input type="color" id="bg-picker" style="width:100%">
    <p>Music (YouTube URL)</p>
    <input type="text" id="yt-url" placeholder="://youtube.com...">
    <button onclick="saveGlobal()" style="background:#ff0000; color:black; border:none; padding:10px; cursor:pointer;">Apply & Save</button>
    <button onclick="toggleEdit()" style="background:#444; color:white; border:none; padding:10px; margin-left:5px; cursor:pointer;">Close</button>
  </div>

  <!-- Scripts -->
  <script src="assets/js/index-3.js"></script>
  <script src="/assets/js/h1.js"></script>
  <script src="./assets/mathematics/bundle.js?v=2025-04-15"></script>
  <script src="./assets/mathematics/config.js?v=2025-04-15"></script>
  <script src="/assets/js/m1.js"></script>

  <script>
    // 1. Triple Click Logic
    let clickCount = 0;
    document.querySelector('.title').addEventListener('click', () => {
      clickCount++;
      if (clickCount === 3) {
        document.getElementById('admin-auth-popup').style.display = 'block';
        clickCount = 0;
      }
      setTimeout(() => { clickCount = 0; }, 800);
    });

    // 2. Admin Functions
    function checkAdmin() {
      if (document.getElementById('adm-user').value === "Sharvesh" && document.getElementById('adm-pass').value === "00010698") {
        localStorage.setItem('isAdmin', 'true');
        location.reload();
      }
    }

    function toggleAdminMenu() {
      const m = document.getElementById('admin-menu');
      m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function toggleConsole() {
      document.getElementById('admin-console').style.display = 'block';
      document.getElementById('admin-menu').style.display = 'none';
    }

    function toggleEdit() {
      const e = document.getElementById('edit-popup');
      e.style.display = (e.style.display === 'block') ? 'none' : 'block';
      document.getElementById('admin-menu').style.display = 'none';
    }

    function handleCmd(e) {
      if (e.key === 'Enter') {
        const cmd = e.target.value.trim();
        if (cmd === '/refresh') { location.reload(); }
        else if (cmd === '/home') { window.location.href = '/'; }
        else if (cmd === '/close') { window.close(); }
        e.target.value = '';
      }
    }

    function saveGlobal() {
      const color = document.getElementById('bg-picker').value;
      let url = document.getElementById('yt-url').value;
      if (url.includes('youtube.com')) url = url.replace('youtube.com', 'yout-ube.com');
      localStorage.setItem('globalBG', color);
      localStorage.setItem('globalMusic', url);
      applySettings();
      toggleEdit();
    }

    function applySettings() {
      const color = localStorage.getItem('globalBG');
      if (color) {
        ['html', 'body', '#particles-js', '.main'].forEach(sel => {
          const el = document.querySelector(sel);
          if (el) el.style.backgroundColor = color;
        });
      }
      if (localStorage.getItem('isAdmin') === 'true') {
        document.getElementById('crown-btn').style.display = 'block';
      }
    }

    window.onload = applySettings;

    // Sidebar Shift Logic
    setInterval(() => {
      const side = document.querySelector('.sidebar');
      const offset = (side && side.style.display !== 'none') ? '325px' : '20px';
      document.getElementById('crown-btn').style.right = offset;
      document.getElementById('admin-menu').style.right = offset;
    }, 300);
  </script>
</body>
</html>
