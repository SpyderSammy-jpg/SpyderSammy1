<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpyderSammy Proxy</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Message box styling */
        #update-message {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            z-index: 9999;
            max-width: 90%;
            text-align: center;
            font-size: 15px;
        }

        /* Iframe fills the page */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        /* Ensure AI widget stays above iframe */
        .elfsight-app {
            position: fixed !important;
            z-index: 99999 !important;
        }
    </style>

    <script>
        // Show alert on entry
        window.onload = function() {
            alert("The homepage is being updated. Redirecting you to the tabs page...");
        };
    </script>
</head>

<body>

    <!-- On‑page message -->
    <div id="update-message">
        The homepage is being updated. Redirecting you to the tabs page...  
        Your SpyderSammy Proxy is going through a massive upgrade with audio players, 
        faster unblocking service, group chats, anime players, movie players, translators, 
        and many more! These will be released by April 28th!  
        — SpyderSammy Team
    </div>

    <!-- Iframe loading the new page -->
    <iframe src="https://spyder-network.vercel.app/d"></iframe>

    <!-- AI Chatbot (always on top) -->
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <div class="elfsight-app-58e557d5-231c-43da-b17c-7f1d9afa1010" data-elfsight-app-lazy></div>

</body>
</html>
